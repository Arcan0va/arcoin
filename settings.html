<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ārcøin — Settings</title>
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="settings.css" />
  <script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tweetnacl-util@0.15.1/nacl-util.min.js"></script>
  <script src="api.js"></script>
</head>
<body>

  <div class="bg-orbs"></div>

  <nav class="navbar">
    <div class="nav-logo">Ārc<span>ø</span>in</div>
    <div class="nav-links">
      <a href="wallet.html" class="nav-link">Wallet</a>
      <a href="contact.html" class="nav-link">Contact</a>
      <a href="settings.html" class="nav-link active">Settings</a>
    </div>
    <div class="nav-right">
      <div class="status-pill">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">—</span>
      </div>
      <button class="btn btn-ghost btn-sm" id="btnLogout">Sign Out</button>
    </div>
  </nav>

  <main class="settings-main">

    <h1 class="page-title">Settings</h1>

    <div class="settings-grid">

      <!-- PASSWORD -->
      <div class="glass settings-card">
        <div class="settings-card-title">Security — Password</div>
        <div class="input-group">
          <label>Current password</label>
          <input type="password" id="oldPassword" placeholder="••••••••" />
        </div>
        <div class="input-group">
          <label>New password</label>
          <input type="password" id="newPassword" placeholder="minimum 8 characters" />
        </div>
        <div class="input-group">
          <label>Confirm new password</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary" id="btnChangePassword">Change Password</button>
      </div>

      <!-- KEYS -->
      <div class="glass settings-card">
        <div class="settings-card-title">Cryptographic Keys</div>
        <div class="key-section">
          <div class="key-label">Public Key</div>
          <div class="key-val" id="settingsPubKey">—</div>
          <button class="btn btn-ghost btn-sm mt" id="btnCopyPub">Copy</button>
        </div>
        <div class="key-section mt">
          <div class="key-label warn">⚠ Private Key</div>
          <div class="key-val blurred" id="settingsPrivKey">—</div>
          <div style="display:flex;gap:0.5rem" class="mt">
            <button class="btn btn-ghost btn-sm" id="btnRevealPriv">Show</button>
            <button class="btn btn-ghost btn-sm" id="btnCopyPriv">Copy</button>
          </div>
        </div>
        <p class="hint mt">Never share your private key. It is stored in memory only and will be lost when you sign out.</p>
      </div>

      <!-- ACCOUNT INFO -->
      <div class="glass settings-card">
        <div class="settings-card-title">Account Information</div>
        <div class="info-row">
          <span class="info-label">Username</span>
          <span class="info-val" id="settingsId">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">Balance</span>
          <span class="info-val" id="settingsBalance">— ARC</span>
        </div>
        <div class="info-row">
          <span class="info-label">Trust Score</span>
          <span class="info-val" id="settingsTrust">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">Status</span>
          <span class="info-val" id="settingsStatus">—</span>
        </div>
        <div class="divider"></div>
        <button class="btn btn-danger btn-sm" id="btnLogoutSettings">Sign Out</button>
      </div>

    </div>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script>
    requireAuth()

    const user    = Session.getUser()
    const userId  = user?.id
    const privKey = user?.privKey || null

    document.getElementById("settingsId").textContent      = userId || "—"
    document.getElementById("settingsPubKey").textContent  = user?.pubKey || "—"
    document.getElementById("settingsPrivKey").textContent = privKey || "Not available"

    API.getUser(userId).then(data => {
      if (!data || data.error) return
      document.getElementById("settingsBalance").textContent = `${data.balance} ARC`
      document.getElementById("settingsTrust").textContent   = data.trust
      document.getElementById("settingsStatus").textContent  = data.status
    })

    document.getElementById("btnCopyPub").addEventListener("click", () => {
      navigator.clipboard.writeText(user?.pubKey || "")
      showToast("Public key copied!", "success")
    })

    document.getElementById("btnRevealPriv").addEventListener("click", () => {
      const el = document.getElementById("settingsPrivKey")
      el.classList.toggle("blurred")
      document.getElementById("btnRevealPriv").textContent =
        el.classList.contains("blurred") ? "Show" : "Hide"
    })

    document.getElementById("btnCopyPriv").addEventListener("click", () => {
      navigator.clipboard.writeText(privKey || "")
      showToast("Private key copied!", "success")
    })

    document.getElementById("btnChangePassword").addEventListener("click", async () => {
      const oldP = document.getElementById("oldPassword").value
      const newP = document.getElementById("newPassword").value
      const conf = document.getElementById("confirmPassword").value

      if (!oldP || !newP || !conf) { showToast("Fill in all fields", "error"); return }
      if (newP !== conf)           { showToast("Passwords don't match", "error"); return }
      if (newP.length < 8)         { showToast("Minimum 8 characters", "error"); return }

      const btn = document.getElementById("btnChangePassword")
      btn.disabled = true
      btn.textContent = "..."

      const data = await API.changePassword(oldP, newP)

      btn.disabled = false
      btn.textContent = "Change Password"

      if (data?.success) {
        showToast("Password changed ✓", "success")
        document.getElementById("oldPassword").value    = ""
        document.getElementById("newPassword").value    = ""
        document.getElementById("confirmPassword").value = ""
      } else {
        showToast(data?.error || "Error", "error")
      }
    })

    const logout = () => { Session.clear(); window.location.href = "login.html" }
    document.getElementById("btnLogout").addEventListener("click", logout)
    document.getElementById("btnLogoutSettings").addEventListener("click", logout)

    checkServerStatus()
  </script>
</body>
</html>
