<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ārcøin Wallet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <!-- Libs crypto (browser builds) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tweetnacl/1.0.3/nacl.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tweetnacl-util/0.15.1/nacl-util.min.js"></script>
  <!-- QR code -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- OTP (speakeasy browser build via unpkg) -->
  <script src="https://unpkg.com/totp-generator@0.0.14/dist/index.umd.js"></script>
</head>
<body>

  <!-- BACKGROUND GRID -->
  <div class="bg-grid"></div>
  <div class="scanline"></div>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <span class="logo-arc">Ārc</span><span class="logo-coin">øin</span>
      <span class="logo-tag">// WALLET v0.1</span>
    </div>
    <div class="header-right">
      <div id="statusDot" class="status-dot offline"></div>
      <span id="statusText" class="status-text">OFFLINE</span>
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- PANEL GAUCHE : identité -->
    <section class="panel panel-left">

      <!-- BLOC : pas de compte -->
      <div id="blockNoAccount" class="card active">
        <div class="card-title">// INIT WALLET</div>
        <p class="card-desc">Génère tes clés ou importe-les pour commencer.</p>
        <div class="btn-group">
          <button class="btn btn-primary" id="btnGenerate">GÉNÉRER LES CLÉS</button>
          <button class="btn btn-ghost" id="btnImport">IMPORTER</button>
        </div>
        <div id="importArea" class="hidden">
          <label>Clé privée (base64)</label>
          <input type="password" id="importPrivKey" placeholder="colle ta clé privée ici..." />
          <button class="btn btn-primary mt" id="btnImportConfirm">IMPORTER</button>
        </div>
      </div>

      <!-- BLOC : clés générées, register -->
      <div id="blockRegister" class="card hidden">
        <div class="card-title">// REGISTER</div>
        <div class="key-display">
          <label>PUBLIC KEY</label>
          <div class="key-value" id="displayPubKey">—</div>
        </div>
        <div class="key-display">
          <label>PRIVATE KEY <span class="warn">⚠ SAUVEGARDE LA</span></label>
          <div class="key-value secret" id="displayPrivKey">—</div>
          <button class="btn-tiny" id="btnReveal">AFFICHER</button>
        </div>
        <div class="input-group mt">
          <label>ID utilisateur</label>
          <input type="text" id="inputUserId" placeholder="ex: gamer42" />
        </div>
        <button class="btn btn-primary mt" id="btnRegister">CRÉER LE COMPTE</button>
      </div>

      <!-- BLOC : compte actif -->
      <div id="blockAccount" class="card hidden">
        <div class="card-title">// ACCOUNT</div>
        <div class="account-id" id="displayAccountId">—</div>
        <div class="balance-block">
          <span class="balance-amount" id="displayBalance">—</span>
          <span class="balance-unit">ARC</span>
        </div>
        <div class="trust-block">
          <span class="trust-label">TRUST</span>
          <div class="trust-bar"><div class="trust-fill" id="trustFill"></div></div>
          <span class="trust-value" id="trustValue">—</span>
        </div>
        <div class="btn-group mt">
          <button class="btn btn-ghost btn-sm" id="btnRefresh">↻ REFRESH</button>
          <button class="btn btn-danger btn-sm" id="btnLogout">DÉCONNECTER</button>
        </div>

        <!-- 2FA setup -->
        <div id="block2FA" class="hidden mt">
          <div class="card-title">// 2FA SETUP</div>
          <p class="card-desc">Scanne ce QR avec Google Authenticator</p>
          <div id="qrcode"></div>
          <div class="secret-2fa" id="display2FASecret">—</div>
          <button class="btn btn-primary mt" id="btnConfirm2FA">2FA CONFIGURÉ ✓</button>
        </div>
      </div>

    </section>

    <!-- PANEL DROIT : actions -->
    <section class="panel panel-right">

      <!-- TABS -->
      <div class="tabs">
        <button class="tab active" data-tab="send">ENVOYER</button>
        <button class="tab" data-tab="history">HISTORIQUE</button>
      </div>

      <!-- TAB SEND -->
      <div id="tabSend" class="tab-content active">
        <div class="card">
          <div class="card-title">// TRANSACTION</div>
          <div class="input-group">
            <label>DESTINATAIRE (ID)</label>
            <input type="text" id="inputReceiver" placeholder="ex: user2" />
          </div>
          <div class="input-group">
            <label>MONTANT (ARC)</label>
            <input type="number" id="inputAmount" placeholder="100" min="1" />
          </div>
          <div class="input-group">
            <label>NOTE (optionnel)</label>
            <input type="text" id="inputNote" placeholder="ex: farm iron" />
          </div>
          <div class="input-group">
            <label>CODE 2FA</label>
            <input type="text" id="input2FA" placeholder="000000" maxlength="6" />
            <div class="otp-timer">
              <div class="otp-bar"><div class="otp-fill" id="otpFill"></div></div>
              <span id="otpCountdown">30s</span>
            </div>
          </div>
          <button class="btn btn-primary mt" id="btnSend">ENVOYER →</button>
          <div id="txResult" class="tx-result hidden"></div>
        </div>
      </div>

      <!-- TAB HISTORY -->
      <div id="tabHistory" class="tab-content hidden">
        <div class="card">
          <div class="card-title">// LEDGER</div>
          <div id="historyList" class="history-list">
            <div class="empty-state">Aucune transaction</div>
          </div>
          <button class="btn btn-ghost mt" id="btnLoadHistory">CHARGER ↓</button>
        </div>
      </div>

    </section>

  </main>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="wallet.js"></script>
</body>
</html>
