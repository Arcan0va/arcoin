<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ārcøin — Wallet</title>
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="wallet.css" />
</head>
<body>

  <div class="bg-orbs"></div>

  <nav class="navbar">
    <div class="nav-logo">Ārc<span>ø</span>in</div>
    <div class="nav-links">
      <a href="wallet.html" class="nav-link active">Wallet</a>
      <a href="contact.html" class="nav-link">Contact</a>
      <a href="settings.html" class="nav-link">Settings</a>
    </div>
    <div class="nav-right">
      <div class="status-pill">
        <div class="status-dot"></div>
        <span class="status-text">—</span>
      </div>
      <button class="btn btn-ghost btn-sm" id="btnLogout">Sign Out</button>
    </div>
  </nav>

  <main class="wallet-main">

    <div class="wallet-grid">

      <!-- BALANCE -->
      <div class="glass card-balance">
        <div class="card-title">Your Balance</div>
        <div class="balance-amount"><span id="walletBalance">—</span> <span class="balance-unit">ARC</span></div>
        <div class="balance-fiat" id="walletFiat">—</div>
        <div class="wallet-user" id="walletUser">—</div>
      </div>

      <!-- PRICE -->
      <div class="glass card-price">
        <div class="card-title">ARC Price</div>
        <div class="price-row">
          <span class="price-val" id="priceEUR">—</span>
          <span class="price-val" id="priceUSD">—</span>
        </div>
        <div class="price-meta" id="priceMeta">—</div>
        <div class="chart-wrap">
          <canvas id="priceChart"></canvas>
        </div>
      </div>

      <!-- TRUST -->
      <div class="glass card-trust">
        <div class="card-title">Reputation Score</div>
        <div class="trust-circle">
          <svg viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="34" class="trust-bg"/>
            <circle cx="40" cy="40" r="34" class="trust-arc" id="trustArc"/>
          </svg>
          <div class="trust-val" id="trustValue">—</div>
        </div>
      </div>

      <!-- SEND -->
      <div class="glass card-send">
        <div class="card-title">Send ARC</div>
        <div class="input-group">
          <label>Recipient username</label>
          <div class="input-wrap">
            <span class="input-icon">◈</span>
            <input type="text" id="sendReceiver" placeholder="recipient's username" />
          </div>
        </div>
        <div class="input-group">
          <label>Amount (ARC)</label>
          <input type="number" id="sendAmount" placeholder="100" min="1" />
        </div>
        <div class="input-group">
          <label>Note (optional)</label>
          <input type="text" id="sendNote" placeholder="e.g. farm iron" />
        </div>
        <div class="input-group">
          <label>2FA Code — Open Google Authenticator and enter the 6-digit code</label>
          <div class="input-wrap">
            <span class="input-icon">⬡</span>
            <input type="text" id="send2FA" placeholder="000000" maxlength="6" inputmode="numeric" />
          </div>
          <div class="otp-bar-wrap">
            <div class="otp-bar"><div class="otp-fill" id="otpFill"></div></div>
            <span class="otp-time" id="otpTime">30s</span>
          </div>
          <div class="otp-hint">⚠ The code changes every 30 seconds — enter it quickly</div>
        </div>
        <button class="btn btn-primary" id="btnSend">Send →</button>
        <div id="sendResult" class="send-result hidden"></div>
      </div>

      <!-- RECEIVE -->
      <div class="glass card-receive">
        <div class="card-title">Receive ARC</div>
        <p class="receive-hint">Share your username so others can send you ARC</p>
        <div class="qr-wrap" id="receiveQR"></div>
        <div class="receive-id" id="receiveId">—</div>
        <button class="btn btn-ghost btn-sm mt" id="btnCopyId">Copy username</button>
      </div>

      <!-- HISTORY -->
      <div class="glass card-history">
        <div class="card-title-row">
          <div class="card-title">Transaction History</div>
          <button class="btn btn-ghost btn-sm" id="btnRefreshHistory">↺</button>
        </div>
        <div class="history-list" id="historyList">
          <div class="empty-state">Loading...</div>
        </div>
      </div>

    </div>

  </main>

  <div id="toast" class="toast hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tweetnacl-util@0.15.1/nacl-util.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="api.js"></script>
  <script src="wallet.js"></script>
</body>
</html>
