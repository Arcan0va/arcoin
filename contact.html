<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ārcøin — Contact</title>
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="contact.css" />
  <script src="api.js"></script>
</head>
<body>

  <div class="bg-orbs"></div>

  <nav class="navbar">
    <div class="nav-logo">Ārc<span>ø</span>in</div>
    <div class="nav-links">
      <a href="wallet.html" class="nav-link">Wallet</a>
      <a href="miners.html" class="nav-link">Miners</a>
      <a href="contact.html" class="nav-link active">Contact</a>
      <a href="settings.html" class="nav-link">Settings</a>
    </div>
    <div class="nav-right">
      <div class="status-pill">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">—</span>
      </div>
    </div>
  </nav>

  <main class="contact-main">
    <div class="contact-wrap">
      <h1 class="page-title">Contact</h1>
      <p class="page-sub">Have a question, issue or suggestion? Send us a message.</p>

      <div class="glass contact-card">
        <div class="input-group">
          <label>Your username (optional)</label>
          <input type="text" id="contactId" placeholder="e.g. gamer42" />
        </div>
        <div class="input-group">
          <label>Subject</label>
          <input type="text" id="contactSubject" placeholder="e.g. Transaction issue" />
        </div>
        <div class="input-group">
          <label>Message</label>
          <textarea id="contactMessage" rows="5" placeholder="Describe your issue..."></textarea>
        </div>
        <button class="btn btn-primary" id="btnSendContact">Send Message</button>
        <div id="contactResult" class="contact-result hidden"></div>
      </div>

      <div class="contact-info glass">
        <div class="info-item">
          <span class="info-icon">◈</span>
          <div>
            <div class="info-title">Network</div>
            <div class="info-desc mono">arcacoin.duckdns.org</div>
          </div>
        </div>
        <div class="info-item">
          <span class="info-icon">⬡</span>
          <div>
            <div class="info-title">Version</div>
            <div class="info-desc">Arca Coin v0.1 — Alpha</div>
          </div>
        </div>
        <div class="info-item">
          <span class="info-icon">◉</span>
          <div>
            <div class="info-title">Network Status</div>
            <div class="info-desc" id="contactStatus">Checking...</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script>
    checkServerStatus()

    const user = Session.getUser()
    if (user?.id) document.getElementById("contactId").value = user.id

    fetch("https://arcacoin.duckdns.org/price")
      .then(() => { document.getElementById("contactStatus").textContent = "🟢 Online" })
      .catch(() => { document.getElementById("contactStatus").textContent = "🔴 Offline" })

    document.getElementById("btnSendContact").addEventListener("click", () => {
      const subject = document.getElementById("contactSubject").value.trim()
      const message = document.getElementById("contactMessage").value.trim()

      if (!subject || !message) { showToast("Please fill in subject and message", "error"); return }

      const result = document.getElementById("contactResult")
      result.classList.remove("hidden")
      result.textContent = "✓ Message received! We'll get back to you shortly."
      showToast("Message sent!", "success")

      document.getElementById("contactSubject").value = ""
      document.getElementById("contactMessage").value = ""
    })
  </script>
</body>
</html>
